events {
    worker_connections 1024;
}

http {
    # Upstream servers
    upstream fastapi {
        server backend:8000;
    }

    upstream supabase_rest {
        server rest:3000;
    }

    upstream supabase_auth {
        server auth:9999;
    }

    upstream supabase_storage {
        server storage:5000;
    }

    upstream supabase_realtime {
        server realtime:4000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    server {
        listen 80;
        server_name _;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Health check
        location /health {
            proxy_pass http://fastapi;
        }

        # Supabase Auth
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://supabase_auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Supabase REST (PostgREST)
        location /rest/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://supabase_rest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Supabase Storage
        location /storage/ {
            client_max_body_size 50M;
            proxy_pass http://supabase_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Supabase Realtime (WebSocket)
        location /realtime/ {
            proxy_pass http://supabase_realtime/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # MQTT WebSocket (EMQX)
        location /mqtt {
            proxy_pass http://emqx:8083;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Default
        location / {
            return 200 '{"status":"HealthCart API running"}';
            add_header Content-Type application/json;
        }
    }

    # HTTPS server (uncomment after SSL setup)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate /etc/nginx/ssl/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/live/your-domain.com/privkey.pem;
    #     # ... same location blocks as above ...
    # }
}
