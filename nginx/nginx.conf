events {
    worker_connections 1024;
}

http {
    # Upstream servers
    upstream fastapi {
        server api:8000;
    }

    upstream supabase_rest {
        server rest:3000;
    }

    upstream supabase_auth {
        server auth:9999;
    }

    upstream supabase_storage {
        server storage:5000;
    }

    upstream supabase_realtime {
        server realtime:4000;
    }

    upstream web_dashboard {
        server web:3000;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name epochrevive.com api.epochrevive.com realtime.epochrevive.com admin.epochrevive.com;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name epochrevive.com api.epochrevive.com realtime.epochrevive.com admin.epochrevive.com;

        ssl_certificate /etc/letsencrypt/live/epochrevive.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/epochrevive.com/privkey.pem;

        # SSL optimization
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Health check
        location /health {
            proxy_pass http://fastapi;
        }

        # Supabase Auth
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://supabase_auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Supabase REST (PostgREST)
        location /rest/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://supabase_rest/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # Supabase Storage
        location /storage/ {
            client_max_body_size 50M;
            proxy_pass http://supabase_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Supabase Realtime (WebSocket)
        location /realtime/ {
            proxy_pass http://supabase_realtime/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # MQTT WebSocket (EMQX)
        location /mqtt {
            proxy_pass http://emqx:8083;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # Default - Web Dashboard
        location / {
            proxy_pass http://web_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
