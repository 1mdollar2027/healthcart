name: healthcart
description: HealthCart – India's Telemedicine Super-App. Consult, prescribe, order, monitor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──
  provider: ^6.1.2

  # ── Navigation ──
  go_router: ^14.6.2

  # ── Supabase ──
  supabase_flutter: ^2.8.1

  # ── Video Calling ──
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

  # ── Payments ──
  razorpay_flutter: ^1.3.7

  # ── UI / Design ──
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.3
  fl_chart: ^0.69.2
  intl: ^0.20.2

  # ── Networking & Utils ──
  http: ^1.2.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.3
  pdf: ^3.11.1
  flutter_pdfview: ^1.3.3
  path_provider: ^2.1.4

  # ── Notifications ──
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.4
  flutter_local_notifications: ^18.0.1

  # ── Maps ──
  # mapmyindia_gl: ^1.0.0  # Add when MapMyIndia SDK is needed

  # ── MQTT (IoT) ──
  mqtt_client: ^10.6.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
